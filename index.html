<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markdown</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="https://cdn.hackclub.com/019ed465-9553-7969-8920-8232f12bc730/Untitled%20design%20(30).png" type="image/x-icon">
    <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
    <script src="script.js" defer></script>
</head>
<body>
    <div id="corner">
        <a href="https://github.com/aryanbrite/Markdown" target="_blank">
            <img src="https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/github-white-icon.png" alt="">
        </a>
    </div>
    <nav>
        <div class="logoo">
            <img id="logo" src="https://cdn.hackclub.com/019ed465-9553-7969-8920-8232f12bc730/Untitled%20design%20(30).png" alt="logo">
            <h3>markdown previewer</h3>
        </div>
    </nav>
    <div class="main">
        <div id="mark">
            <textarea name="" id="editor"></textarea>
        </div>
        <div id="prev">
         
        </div>
    </div>
</body>
</html>
